<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>互動語言練習 - 醫療與健康</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background: #f7f7f7; }
        #quiz-container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 480px; text-align: center; }
        .target-image { width: 280px; height: 210px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; border: 1px solid #ddd; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 15px; font-size: 18px; border: 2px solid #e5e5e5; border-radius: 12px; background: white; cursor: pointer; transition: 0.2s; }
        button:hover:not(:disabled) { background: #f0f0f0; }
        .correct { background: #d7ffb8 !important; border-color: #58cc02 !important; color: #58cc02; }
        .wrong { background: #ffdfe0 !important; border-color: #ff4b4b !important; color: #ff4b4b; }
        #submit-btn { padding: 15px; font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer; width: 100%; margin-top: 20px; background-color: #1cb0f6; color: white; border: none; }
        #submit-btn:disabled { background-color: #e5e5e5 !important; color: #afafaf !important; cursor: not-allowed; }
        #sentence-hint { font-size: 22px; font-weight: bold; margin-bottom: 15px; min-height: 60px; line-height: 1.4; color: #333; }
        .highlight { color: #1cb0f6; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div style="width: 100%; background: #e5e5e5; height: 12px; border-radius: 10px; margin-bottom: 20px;">
        <div id="progress-fill" style="width: 0%; background: #58cc02; height: 100%; border-radius: 10px; transition: 0.3s;"></div>
    </div>

    <div id="game-zone">
        <h2 id="question-type-text" style="font-size: 16px; color: #999; margin-bottom: 5px;">選出正確的單字</h2>
        <div id="sentence-hint"></div>

        <img id="main-image" class="target-image" src="" alt="題目圖片">

        <div id="options" class="options-grid"></div>

        <div id="input-zone" style="display: none; margin-top: 10px;">
            <input type="text" id="user-input" placeholder="Type the answer here..." autocomplete="off"
                   style="width: 85%; padding: 12px; font-size: 20px; border-radius: 10px; border: 2px solid #ddd; text-align: center;">
        </div>

        <button id="submit-btn" disabled>確認提交</button>
        <p id="feedback" style="font-weight: bold; margin-top: 10px;"></p>
    </div>

    <div id="result-zone" style="display: none;">
        <h1 style="font-size: 60px;">🎉</h1>
        <h2>學習完成！你真的很棒！</h2>
        <button onclick="restartGame()" style="background: #58cc02; color: white; border: none; padding: 15px 40px; border-radius: 12px; cursor: pointer; font-size: 20px;">重新開始</button>
    </div>
</div>

<script>
// 題庫：action 組新增 sentenceNoun（填空句只挖這個關鍵名詞）
// options 已統一大小寫
const allQuestions = [
    { image: "./image/ambulance.jpg",   answer: "Call an ambulance", noun: "ambulance",   sentenceNoun: "ambulance",  symptom: "a broken arm",  group: "action",  options: ["Call an ambulance", "Go to the doctor", "Take medicine",   "Drink liquids"]    },
    { image: "./image/bandage.jpg",     answer: "Put on a bandage",  noun: "bandage",     sentenceNoun: "bandage",    symptom: "a bruise",      group: "action",  options: ["Put on a bandage",  "Put ice on",        "Bruise",           "Get some rest"]    },
    { image: "./image/broken_arm.jpg",  answer: "Broken arm",        noun: "broken arm",                              symptom: "broken arm",    group: "symptom", options: ["Broken arm",        "Headache",          "Fever",            "Cough"]            },
    { image: "./image/bruise.jpg",      answer: "Bruise",            noun: "bruise",                                  symptom: "bruise",        group: "symptom", options: ["Bruise",            "Cold",              "Put on a bandage", "Take care of"]     },
    { image: "./image/care.jpg",        answer: "Take care of",      noun: "care",        sentenceNoun: "care",       symptom: "a cold",        group: "action",  options: ["Take care of",      "Go to the doctor",  "Get some rest",    "Drink liquids"]    },
    { image: "./image/cold.jpg",        answer: "Cold",              noun: "cold",                                    symptom: "cold",          group: "symptom", options: ["Cold",              "Runny nose",        "Cough",            "Fever"]            },
    { image: "./image/cough.jpg",       answer: "Cough",             noun: "cough",                                   symptom: "cough",         group: "symptom", options: ["Cough",             "Headache",          "Stomachache",      "Cold"]             },
    { image: "./image/doctor.jpg",      answer: "Go to the doctor",  noun: "doctor",      sentenceNoun: "doctor",     symptom: "a fever",       group: "action",  options: ["Go to the doctor",  "Take care of",      "Take medicine",    "Call an ambulance"]},
    { image: "./image/fever.jpg",       answer: "Fever",             noun: "fever",                                   symptom: "fever",         group: "symptom", options: ["Fever",             "Cold",              "Headache",         "Cough"]            },
    { image: "./image/headache.jpg",    answer: "Headache",          noun: "headache",                                symptom: "headache",      group: "symptom", options: ["Headache",          "Stomachache",       "Fever",            "Broken arm"]       },
    { image: "./image/ice.jpg",         answer: "Put ice on",        noun: "ice",         sentenceNoun: "ice",        symptom: "a fever",       group: "action",  options: ["Put ice on",        "Put on a bandage",  "Take medicine",    "Drink liquids"]    },
    { image: "./image/medicine.jpg",    answer: "Take medicine",     noun: "medicine",    sentenceNoun: "medicine",   symptom: "a headache",    group: "action",  options: ["Take medicine",     "Drink liquids",     "Go to the doctor", "Put ice on"]       },
    { image: "./image/rest.jpg",        answer: "Get some rest",     noun: "rest",        sentenceNoun: "rest",       symptom: "a cold",        group: "action",  options: ["Get some rest",     "Take care of",      "Cold",             "Fever"]            },
    { image: "./image/runny_nose.jpg",  answer: "Runny nose",        noun: "runny nose",                              symptom: "runny nose",    group: "symptom", options: ["Runny nose",        "Cough",             "Cold",             "Headache"]         },
    { image: "./image/stomachache.jpg", answer: "Stomachache",       noun: "stomachache",                             symptom: "stomachache",   group: "symptom", options: ["Stomachache",       "Headache",          "Fever",            "Bruise"]           },
    { image: "./image/water.jpg",       answer: "Drink liquids",     noun: "liquids",     sentenceNoun: "liquids",    symptom: "a fever",       group: "action",  options: ["Drink liquids",     "Take medicine",     "Put ice on",       "Get some rest"]    }
];

let currentPool = [];
const totalStandard = 16;
let correctCount  = 0;
let selectedOption = null;
let currentMode   = "choice";

const correctSound = new Audio('./sound/correct.mp3');
const wrongSound   = new Audio('./sound/wrong.mp3');

function startGame() {
    currentPool  = [...allQuestions].sort(() => 0.5 - Math.random());
    correctCount = 0;
    document.getElementById("game-zone").style.display   = "block";
    document.getElementById("result-zone").style.display = "none";
    updateProgress();
    loadQuestion();
}

function loadQuestion() {
    if (currentPool.length === 0) { showResult(); return; }

    const q     = currentPool[0];
    const modes = ["choice", "spelling", "sentence"];
    currentMode = modes[Math.floor(Math.random() * modes.length)];

    // ── 重置 UI ──
    document.getElementById("main-image").src        = q.image;
    document.getElementById("feedback").innerText    = "";
    document.getElementById("feedback").style.color  = "#333";
    document.getElementById("user-input").value      = "";
    document.getElementById("user-input").oninput    = null;  // 清除殘留事件
    document.getElementById("user-input").disabled   = false;
    document.getElementById("submit-btn").disabled   = true;
    selectedOption = null;

    const optionsDiv = document.getElementById("options");
    const inputZone  = document.getElementById("input-zone");
    const hintDiv    = document.getElementById("sentence-hint");

    if (currentMode === "choice") {
        document.getElementById("question-type-text").innerText = "選擇題";
        hintDiv.innerHTML        = "";   // 清除上題殘留句子
        optionsDiv.style.display = "grid";
        inputZone.style.display  = "none";
        renderOptions(q);
    }
    else if (currentMode === "spelling") {
        document.getElementById("question-type-text").innerText = "請拼出關鍵字 (名詞拼寫)";
        optionsDiv.style.display = "none";
        inputZone.style.display  = "block";
        // 片語語境中挖空名詞
        hintDiv.innerHTML = q.answer.replace(
            new RegExp(q.noun, "gi"),
            `${makeCloze(q.noun)}</span>`
        );
        setupInput();
    }
    else if (currentMode === "sentence") {
        document.getElementById("question-type-text").innerText = "完成填空 (句型練習)";
        optionsDiv.style.display = "none";
        inputZone.style.display  = "block";

        if (q.group === "symptom") {
            // 症狀組：挖空症狀名詞
            hintDiv.innerHTML =
                `She has a <span class="highlight">${makeCloze(q.noun)}</span>. She should go to the doctor.`;
        } else {
            // 片語組：只挖空關鍵名詞（sentenceNoun），保留片語其他字
            const actionWithBlank = q.answer.replace(
                new RegExp("\\b" + q.sentenceNoun + "\\b", "gi"),
                `${makeCloze(q.sentenceNoun)}</span>`
            );
            hintDiv.innerHTML = `She has ${q.symptom}. She should <span class="highlight">${actionWithBlank}.`;
        }
        setupInput();
    }
}

// 每個詞保留首字母，其餘換成底線
function makeCloze(word) {
    if (!word) return "";
    return word.split(' ').map(w => w[0] + "_".repeat(w.length - 1)).join(' ');
}

function renderOptions(q) {
    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";
    [...q.options].sort(() => 0.5 - Math.random()).forEach(opt => {
        const btn = document.createElement("button");
        btn.innerText = opt;
        btn.onclick = () => {
            speak(opt);
            document.querySelectorAll("#options button").forEach(b => {
                b.style.backgroundColor = "white";
                b.style.borderColor     = "#e5e5e5";
            });
            btn.style.backgroundColor = "#ddf4ff";
            btn.style.borderColor     = "#1cb0f6";
            selectedOption = opt;
            document.getElementById("submit-btn").disabled = false;
        };
        optionsDiv.appendChild(btn);
    });
}

function setupInput() {
    const input = document.getElementById("user-input");
    input.focus();
    input.oninput = () => {
        selectedOption = input.value.trim();
        document.getElementById("submit-btn").disabled = selectedOption.length === 0;
    };
}

document.getElementById("submit-btn").onclick = function() {
    const q = currentPool[0];

    // 送出後鎖定所有互動
    document.querySelectorAll("#options button").forEach(b => b.disabled = true);
    document.getElementById("user-input").disabled = true;
    this.disabled = true;

    const userAns = (selectedOption || "").toLowerCase().trim();
    let isCorrect     = false;
    let correctDisplay = "";

    if (currentMode === "choice") {
        isCorrect      = userAns === q.answer.toLowerCase();
        correctDisplay = q.answer;
        document.querySelectorAll("#options button").forEach(b => {
            if (b.innerText.toLowerCase() === q.answer.toLowerCase()) b.classList.add("correct");
            else if (b.innerText === selectedOption)                  b.classList.add("wrong");
        });
    }
    else if (currentMode === "spelling") {
        isCorrect      = userAns === q.noun.toLowerCase();
        correctDisplay = q.noun;
    }
    else {
        // sentence 模式：症狀組填 noun，片語組填 sentenceNoun
        const target   = (q.group === "symptom") ? q.noun : q.sentenceNoun;
        isCorrect      = userAns === target.toLowerCase();
        correctDisplay = target;
    }

    const feedback = document.getElementById("feedback");
    if (isCorrect) {
        correctSound.play().catch(() => {});
        feedback.innerText   = "太棒了！✨";
        feedback.style.color = "#58cc02";
        currentPool.shift();
        correctCount++;
        updateProgress();
        setTimeout(() => {
            document.getElementById("user-input").disabled = false;
            loadQuestion();
        }, 1500);
    } else {
        wrongSound.play().catch(() => {});
        feedback.innerText   = `不對喔，正確答案是: ${correctDisplay}`;
        feedback.style.color = "#ff4b4b";
        let failed = currentPool.shift();
        currentPool.push(failed);
        setTimeout(() => {
            document.getElementById("user-input").disabled = false;
            loadQuestion();
        }, 2500);
    }
};

function speak(text) {
    try {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US';
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(msg);
    } catch(e) {}
}

function updateProgress() {
    document.getElementById("progress-fill").style.width = (correctCount / totalStandard * 100) + "%";
}

function showResult() {
    document.getElementById("game-zone").style.display   = "none";
    document.getElementById("result-zone").style.display = "block";
}

function restartGame() { startGame(); }

startGame();
</script>
</body>
</html>
